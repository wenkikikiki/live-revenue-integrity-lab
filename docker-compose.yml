x-app-build: &app-build
  build:
    context: .
    dockerfile: Dockerfile
  image: live-revenue-integrity-lab:local

x-app-image: &app-image
  image: live-revenue-integrity-lab:local

x-app-env: &app-env
  MYSQL_DSN: "root:root@tcp(mysql:3306)/live_revenue?parseTime=true&multiStatements=true"
  REDIS_ADDR: "redis:6379"
  KAFKA_BROKER: "kafka:9092"

services:
  app-build:
    <<: *app-build
    command: ["/bin/true"]
    restart: "no"

  mysql:
    image: mysql:8.4.8
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: live_revenue
    command: ["--transaction-isolation=READ-COMMITTED"]
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot >/dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7.4.8
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  kafka:
    image: apache/kafka:4.1.1
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 30

  kafka-init:
    image: apache/kafka:4.1.1
    restart: "no"
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-lc"]
    command:
      - |
        for topic in wallet.transaction.posted.v1 live.gift.accepted.v1 live.gift.rejected.v1 live.comment.created.v1 live.watch.minute.v1 live.session.closed.v1; do
          /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic "$$topic" --partitions 6 --replication-factor 1;
        done

  migrate:
    image: mysql:8.4.8
    restart: "no"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations:ro
    entrypoint: ["/bin/sh", "-lc"]
    command:
      - |
        set -eu
        for file in /migrations/*.sql; do
          sed '/^-- +goose Down/,$$d;/^-- +goose Up/d' "$$file" | mysql -hmysql -uroot -proot live_revenue
        done

  api:
    <<: *app-image
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      <<: *app-env
      HTTP_ADDR: ":8080"
    command: ["/usr/local/bin/api"]
    ports:
      - "127.0.0.1:${API_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz >/dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 20

  outbox-relay:
    <<: *app-image
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
    environment:
      <<: *app-env
    command: ["/usr/local/bin/outbox-relay"]

  leaderboard-projector:
    <<: *app-image
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      <<: *app-env
      LEADERBOARD_METRICS_ADDR: ":9101"
    command: ["/usr/local/bin/leaderboard-projector"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9101/metrics >/dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 20

  points-projector:
    <<: *app-image
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
    environment:
      <<: *app-env
      POINTS_METRICS_ADDR: ":9102"
    command: ["/usr/local/bin/points-projector"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9102/metrics >/dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 20

  settlement-worker:
    <<: *app-image
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
    environment:
      <<: *app-env
    command: ["/usr/local/bin/settlement-worker"]

  prometheus:
    profiles: ["observability"]
    image: prom/prometheus:v3.10.0
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      leaderboard-projector:
        condition: service_healthy
      points-projector:
        condition: service_healthy
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    profiles: ["observability"]
    image: grafana/grafana:12.3.4
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_started
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
